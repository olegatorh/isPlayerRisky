services:
  postgres:
    env_file:
      - .env
    image: postgres:16
    container_name: risky_postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d

  postgres-init:
    env_file:
      - .env
    image: postgres:16
    container_name: risky_postgres_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD}"
    entrypoint: [ "/bin/bash", "-lc" ]
    command: >
      "until pg_isready -h postgres -U admin -d postgres; do sleep 1; done;
      psql -h postgres -U admin -d postgres -c \"CREATE DATABASE airflow_meta;\" || true;
      psql -h postgres -U admin -d postgres -c \"CREATE DATABASE mlflow;\" || true; 
      psql -h postgres -U admin -d postgres -c \"CREATE DATABASE metabase;\" || true;"


  airflow-init:
    env_file:
      - .env
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: risky_airflow_init
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}"

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080


      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET}"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY}"
    command: >
      bash -c "
      airflow db migrate
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/src

  airflow-api-server:
    env_file:
      - .env
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: risky_airflow_api_server
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}"

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080


      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET}"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY}"

      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json

    command: airflow api-server
    ports:
      - "8080:8080"
    volumes:
      - ./:/opt/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/simple_auth_manager_passwords.json:/opt/airflow/simple_auth_manager_passwords.json


  airflow-dag-processor:
    env_file:
      - .env
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: risky_airflow_dag_processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}"

      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080


      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET}"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"
      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY}"
    command: airflow dag-processor
    volumes:
      - ./:/opt/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs

  airflow-scheduler:
    env_file:
      - .env
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: risky_airflow_scheduler
    depends_on:
      - airflow-init
      - airflow-api-server
      - postgres
    environment:
      AIRFLOW_HOME: /opt/airflow

      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"

      AIRFLOW__API__SECRET_KEY: "${AIRFLOW__API__SECRET_KEY}"
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET}"
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY}"

      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    command: airflow scheduler
    volumes:
      - ./:/opt/project
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs

  mlflow:
    env_file:
      - .env
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: risky_mlflow
    depends_on:
      - airflow-init
      - airflow-api-server
      - postgres
    environment:
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI}"
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow,mlflow:5001,localhost,localhost:5001,127.0.0.1,127.0.0.1:5001"
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "http://localhost:5001,http://127.0.0.1:5001,http://localhost:8080"

    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --workers 2
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
      --default-artifact-root mlflow-artifacts:/

    ports:
      - "5001:5001"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts

  metabase:
    image: metabase/metabase:latest
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      MB_DB_TYPE: "${POSTGRES_DB}"
      MB_DB_HOST: "${POSTGRES_DB}"
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: "${POSTGRES_USER}"
      MB_DB_PASS: "${POSTGRES_PASSWORD}"
    ports:
      - "3000:3000"

  app-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risky_api
    depends_on:
      - mlflow
      - metabase
    environment:
      PYTHONPATH: /app
      MLFLOW_TRACKING_URI: http://mlflow:5001
    command: uvicorn api:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - ./:/app
    restart: unless-stopped







  loki:
    image: grafana/loki:3.7.0
    container_name: risky_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml:ro

  grafana:
    image: grafana/grafana:12.2.0
    container_name: risky_grafana
    depends_on:
      - loki
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  alloy:
    image: grafana/alloy:latest
    container_name: risky_alloy
    depends_on:
      - loki
    command: run /etc/alloy/config.alloy --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  mlflow_artifacts:
  grafana_data: